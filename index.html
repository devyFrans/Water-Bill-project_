<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Billing Final Project</title>
</head>
<body>
    <div class="navbar" id="navbar" style="display: none;">
        <img src="" alt="">
        <h1 id="welcomeUser">Water Billing Dashboard</h1>
        <p onclick="homePage()" id="left-bar">Home</p>
        <p onclick="aboutPage()" class="about_Page" id="left-bar">About</p>
        <p onclick="contactPage()" id="left-bar">Contact Us</p>
    </div>
    <div id="main-content" style="display: none;"></div>

        <!-- Login Section -->
    <div class="container" id="loginSection">
        <h2>Search Serial ID</h2>
        <div class="input-group">
            <label>Serial ID
                <input type="text" id="serialID">
                <span class="error-label" id="serialID_error"></span>
            </label>
        </div>
        <button id="searchBtn">Search</button>
        <span class="error-label" id="statusError"></span>
    </div>

    <!-- DASHBOARD SECTION -->
    <div class="container" id="dashboardSection" style="display: none;">
    <h2>Water Billing Receipt</h2>
    <p>Welcome to your Dashboard - Ju_dith</p>

    <div class="input-group">
        <label>Total Amount of Cubics Used
            <input type="text" id="Payment">
        </label>
        <button id="computeBTN">Compute</button>
    </div>
    
    <table class="table">
            <thead>
                <tr>
                    <th>Field</th>
                    <th>Information</th>
                </tr>
            </thead>
            <tbody id="userInfoTable">
                <!-- User Info will be injected here -->
            </tbody>
        </table>
        
    <script src="script.js"></script>
</body>
</html>
